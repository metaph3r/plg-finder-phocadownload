services:
  httpd:
    image: xampp/httpd:2.4
    volumes:
      - ./www:/app/public
      - php-socket:/var/run/php
    ports:
      - "80:80"
  php:
    image: xampp/php:8.4
    environment:
      - APP_ENV=dev
    volumes:
      - ./www:/app/public
      - php-socket:/var/run/php
  mysql:
    image: mysql:8.4
    environment:
      - MYSQL_ROOT_PASSWORD=root
      - MYSQL_DATABASE=joomla
      - MYSQL_USER=joomla
      - MYSQL_PASSWORD=joomla
    volumes:
      - ./mysql-data:/var/lib/mysql
volumes:
  php-socket:
